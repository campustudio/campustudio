  </g>
  <text x="72" y="520" fill="#6b7688" font-size="18">Case study &amp; live demo  coming soon</text>

  <!-- right flow card -->
  <g transform="translate(720,120)">
    <rect width="420" height="390" rx="16" fill="#15121f" stroke="#2a2438"/>
    <text x="28" y="48" fill="#6b7688" font-size="13" letter-spacing="1">AGENT LOOP</text>
    <rect x="28" y="72" width="364" height="48" rx="10" fill="#0c0f16" stroke="#3b3352"/>
    <text x="48" y="102" fill="#e6edf3" font-size="16">1 · Retrieve knowledge + citations</text>
    <rect x="28" y="136" width="364" height="48" rx="10" fill="#0c0f16" stroke="#3b3352"/>
    <text x="48" y="166" fill="#e6edf3" font-size="16">2 · Reason &amp; select tools</text>
    <rect x="28" y="200" width="364" height="48" rx="10" fill="#0c0f16" stroke="#3b3352"/>
    <text x="48" y="230" fill="#e6edf3" font-size="16">3 · Confirm high-risk actions</text>
    <rect x="28" y="264" width="364" height="48" rx="10" fill="#0c0f16" stroke="#3b3352"/>
    <text x="48" y="294" fill="#e6edf3" font-size="16">4 · Execute · audit · evaluate</text>
    <text x="28" y="360" fill="#a78bfa" font-size="14">provider-neutral · citation-grounded</text>
