<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0c0f16"/>
      <stop offset="1" stop-color="#14101c"/>
    </linearGradient>
    <linearGradient id="title" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#b8a9d4"/>
    </linearGradient>
    <radialGradient id="glow" cx="20%" cy="10%" r="65%">
      <stop offset="0" stop-color="#8b7cf6" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#8b7cf6" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <text x="72" y="128" fill="#a78bfa" font-size="20" letter-spacing="3">AI APPLICATION ENGINEERING</text>
  <text x="70" y="210" fill="url(#title)" font-size="58" font-weight="700">Enterprise Knowledge</text>
  <text x="70" y="278" fill="url(#title)" font-size="58" font-weight="700">&amp; Workflow Agent</text>
  <text x="72" y="340" fill="#9aa7b8" font-size="22">RAG · tools · confirmation · audit · evaluation</text>

  <g font-size="17" fill="#e6edf3">
    <rect x="72" y="390" width="90" height="36" rx="18" fill="rgba(255,255,255,0.03)" stroke="#2b3441"/>
    <text x="117" y="413" text-anchor="middle">RAG</text>
    <rect x="174" y="390" width="120" height="36" rx="18" fill="rgba(255,255,255,0.03)" stroke="#2b3441"/>
    <text x="234" y="413" text-anchor="middle">Agents</text>
    <rect x="306" y="390" width="150" height="36" rx="18" fill="rgba(255,255,255,0.03)" stroke="#2b3441"/>
