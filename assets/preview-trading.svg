<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b0e11"/>
      <stop offset="1" stop-color="#0e1319"/>
    </linearGradient>
    <linearGradient id="title" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#9fb3c8"/>
    </linearGradient>
    <radialGradient id="glow" cx="16%" cy="0%" r="70%">
      <stop offset="0" stop-color="#4c8dff" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#4c8dff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Left column: identity -->
  <text x="72" y="132" fill="#4c8dff" font-size="20" letter-spacing="3">REALTIME MARKET MICROSTRUCTURE</text>
  <text x="70" y="214" fill="url(#title)" font-size="70" font-weight="700">Fintech Trading</text>
  <text x="70" y="292" fill="url(#title)" font-size="70" font-weight="700">Terminal</text>

  <text x="72" y="352" fill="#8b949e" font-size="22">Candles, order book, depth, trades, order ticket,</text>
  <text x="72" y="384" fill="#8b949e" font-size="22">on a provider-neutral, reconnecting pipeline.</text>

  <!-- tech badges -->
  <g font-size="19" fill="#e6edf3">
    <rect x="72" y="424" width="118" height="40" rx="20" fill="rgba(255,255,255,0.03)" stroke="#2b3441"/>
    <text x="131" y="450" text-anchor="middle">React 18</text>
    <rect x="206" y="424" width="150" height="40" rx="20" fill="rgba(255,255,255,0.03)" stroke="#2b3441"/>
    <text x="281" y="450" text-anchor="middle">TypeScript</text>
    <rect x="372" y="424" width="205" height="40" rx="20" fill="rgba(255,255,255,0.03)" stroke="#2b3441"/>
    <text x="474" y="450" text-anchor="middle">Ports &amp; Adapters</text>
  </g>

  <text x="72" y="530" fill="#8b949e" font-size="20">github.com/campustudio/fintech-trading-terminal</text>

  <!-- Right column: stylized terminal with candlestick chart + book -->
  <g transform="translate(808,110)">
    <rect x="0" y="0" width="336" height="410" rx="16" fill="#151a21" stroke="#232a34"/>

    <!-- header -->
    <circle cx="24" cy="28" r="6" fill="#16c784"/>
    <text x="40" y="33" fill="#8b949e" font-size="15">Live &#183; BTC-USDT</text>
    <text x="312" y="33" fill="#16c784" font-size="15" text-anchor="end">+1.24%</text>

    <!-- ticker -->
    <text x="22" y="76" fill="#16c784" font-size="34" font-weight="700">61,284.50</text>

    <!-- candlestick chart -->
    <line x1="20" y1="138" x2="316" y2="138" stroke="rgba(139,148,158,0.25)" stroke-dasharray="4 4"/>
    <g stroke-width="1.4">
      <line x1="30" y1="185" x2="30" y2="200" stroke="#16c784"/><rect x="26" y="188" width="8" height="8" fill="#16c784"/>
      <line x1="54" y1="186" x2="54" y2="196" stroke="#ea3943"/><rect x="50" y="188" width="8" height="4" fill="#ea3943"/>
      <line x1="78" y1="178" x2="78" y2="194" stroke="#16c784"/><rect x="74" y="180" width="8" height="12" fill="#16c784"/>
      <line x1="102" y1="172" x2="102" y2="184" stroke="#16c784"/><rect x="98" y="176" width="8" height="4" fill="#16c784"/>
      <line x1="126" y1="174" x2="126" y2="186" stroke="#ea3943"/><rect x="122" y="176" width="8" height="6" fill="#ea3943"/>
      <line x1="150" y1="166" x2="150" y2="184" stroke="#16c784"/><rect x="146" y="168" width="8" height="14" fill="#16c784"/>
      <line x1="174" y1="158" x2="174" y2="172" stroke="#16c784"/><rect x="170" y="160" width="8" height="8" fill="#16c784"/>
      <line x1="198" y1="156" x2="198" y2="168" stroke="#ea3943"/><rect x="194" y="160" width="8" height="4" fill="#ea3943"/>
      <line x1="222" y1="148" x2="222" y2="166" stroke="#16c784"/><rect x="218" y="150" width="8" height="14" fill="#16c784"/>
      <line x1="246" y1="140" x2="246" y2="154" stroke="#16c784"/><rect x="242" y="144" width="8" height="6" fill="#16c784"/>
      <line x1="270" y1="142" x2="270" y2="156" stroke="#ea3943"/><rect x="266" y="144" width="8" height="6" fill="#ea3943"/>
      <line x1="294" y1="136" x2="294" y2="152" stroke="#16c784"/><rect x="290" y="138" width="8" height="12" fill="#16c784"/>
    </g>

    <!-- divider -->
    <line x1="20" y1="224" x2="316" y2="224" stroke="#232a34"/>

    <!-- compact book: asks -->
    <g>
      <rect x="180" y="240" width="132" height="15" fill="rgba(234,57,67,0.16)"/>
      <text x="22" y="252" fill="#ea3943" font-size="13">61,288.40</text>
      <text x="312" y="252" fill="#8b949e" font-size="13" text-anchor="end">1.377</text>
      <rect x="216" y="259" width="96" height="15" fill="rgba(234,57,67,0.16)"/>
      <text x="22" y="271" fill="#ea3943" font-size="13">61,287.00</text>
      <text x="312" y="271" fill="#8b949e" font-size="13" text-anchor="end">0.842</text>
    </g>

    <!-- spread -->
    <text x="22" y="298" fill="#8b949e" font-size="12">Spread</text>
    <text x="312" y="298" fill="#8b949e" font-size="12" text-anchor="end">2.10</text>

    <!-- compact book: bids -->
    <g>
      <rect x="168" y="312" width="144" height="15" fill="rgba(22,199,132,0.16)"/>
      <text x="22" y="324" fill="#16c784" font-size="13">61,285.90</text>
      <text x="312" y="324" fill="#8b949e" font-size="13" text-anchor="end">1.905</text>
      <rect x="108" y="331" width="204" height="15" fill="rgba(22,199,132,0.16)"/>
      <text x="22" y="343" fill="#16c784" font-size="13">61,284.30</text>
      <text x="312" y="343" fill="#8b949e" font-size="13" text-anchor="end">3.281</text>
    </g>

    <!-- order ticket hint -->
    <rect x="20" y="360" width="142" height="34" rx="8" fill="rgba(22,199,132,0.14)" stroke="#16c784"/>
    <text x="91" y="382" fill="#16c784" font-size="14" text-anchor="middle">Buy &#183; limit</text>
    <rect x="174" y="360" width="142" height="34" rx="8" fill="rgba(255,255,255,0.03)" stroke="#2b3441"/>
    <text x="245" y="382" fill="#8b949e" font-size="14" text-anchor="middle">working &#8594; filled</text>
  </g>
</svg>
